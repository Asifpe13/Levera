# Ping Render backend every 10 minutes to prevent free-tier spin-down
name: Keep Render alive

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:  # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: GET backend root
        run: |
          curl -sf --max-time 120 "https://levera-backend.onrender.com/" || true
